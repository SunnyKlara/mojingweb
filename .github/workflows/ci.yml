name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  test:
    name: Unit / Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit + integration tests (shared + backend + frontend)
        run: pnpm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter=frontend exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm --filter=frontend test:e2e
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  audit:
    name: Security audit (pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ADR-0008: Week 1 ships at --audit-level=critical (zero criticals after
      # bumping next, nodemailer, bcrypt, uuid). Remaining 3 high vulns require
      # architecture-level upgrades (Next 15, bcrypt native deps) scheduled for
      # Week 2. Gate raises to --audit-level=high once those land.
      - name: Run pnpm audit (fail on critical vulnerabilities)
        run: pnpm audit --audit-level=critical

  lighthouse:
    name: Lighthouse (baseline, non-blocking — ADR-0005)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Week 1: baseline-only. Hard gate with numeric budgets starts Week 6.
    # Do NOT set this to required on branch protection until then.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter=frontend build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI (collect baseline)
        run: pnpm dlx @lhci/cli@0.14.x autorun --config=frontend/lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30

  build:
    name: Build (${{ matrix.package }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        package: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
        with:
          # Sentry release requires commit history to associate commits to a
          # release. `fetch-depth: 0` is cheap on small repos and keeps the
          # Sentry "commits" tab populated.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.package }}
        run: pnpm --filter=${{ matrix.package }} build
        env:
          # --- Always-on build envs (same on PR + main) ---
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

          # --- Sentry release tagging (always set, safe) ---
          # Every build tags emitted events with the commit SHA so we can
          # pinpoint which deploy a Sentry issue belongs to. This is a pure
          # env injection — no network call, no quota cost.
          SENTRY_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

          # --- Sentry source-map upload (ONLY on push to main) ---
          # On PR builds, SENTRY_AUTH_TOKEN is deliberately left empty which
          # triggers `silent: true` in frontend/next.config.mjs and skips the
          # upload. This (a) saves Sentry quota, (b) avoids leaking PR source
          # maps to the project, (c) mirrors prod-only ADR-0005 practice.
          SENTRY_AUTH_TOKEN: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.SENTRY_AUTH_TOKEN || '' }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ matrix.package == 'frontend' && 'modelzone-frontend' || 'modelzone-backend' }}

          # DSN is public for client, secret-shaped for server (but DSNs are
          # not actually secrets per Sentry docs — they identify the project,
          # not authorize writes). Both paths fall back to no-op if unset.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
